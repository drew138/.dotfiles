---
- name: Install bat
  community.general.homebrew:
    name:
      - bat

- name: Ensure required directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_facts.env.USER }}"
  loop: "{{ ansible_facts['env']['HOME'] }}/.config"

- name: Create bat symlink
  ansible.builtin.file:
    src: "{{ ansible_facts['env']['HOME'] }}/.dotfiles/roles/bat/files"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/bat"
    state: link
    force: true
    follow: false

- name: Rebuild bat cache
  ansible.builtin.command: bat cache --build
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts.env.PATH }}"
  changed_when: false
