"$schema" = "https://starship.rs/config-schema.json"
format    = """
[‚ĖĎ‚Ėí‚Ėď](os_bg)\
$os\
$username\
[Óāī](bg:dir_bg fg:os_bg)\
$directory\
[Óāī](fg:dir_bg bg:git_bg)\
$git_branch\
$git_status\
[Óāī](fg:git_bg bg:lang_bg)\
$golang\
$python\
$lua\
$nodejs\
$rust\
$zig\
$c\
$php\
$java\
$kotlin\
$haskell\
[Óāī](fg:lang_bg)\
\n$character"""
palette   = "nightfox"

[palettes.nightfox]
  red     = "#c94f6d"
  green   = "#81b29a"
  purple  = "#9d79d6"
  yellow  = "#dbc074"
  os_bg   = "#71839b"
  os_fg   = "#131a24"
  dir_bg  = "#81b29a"
  dir_fg  = "#192330"
  git_bg  = "#dbc074"
  git_fg  = "#212e3f"
  lang_bg = "#719cd6"
  lang_fg = "#29394f"

[os]
  disabled = false
  style    = "bg:os_bg fg:os_fg"

  [os.symbols]
    Windows          = "ůįć≤"
    Ubuntu           = "ůįēą"
    SUSE             = "ÔĆĒ"
    Raspbian         = "ůįźŅ"
    Mint             = " ůį£≠ "
    Macos            = "ůįÄĶ"
    Manjaro          = "ÔĆí"
    Linux            = "ůįĆĹ"
    Gentoo           = "ůį£®"
    Fedora           = "ůį£õ"
    Alpine           = "ÔĆÄ"
    Amazon           = "ÔČį"
    Android          = "Óúé"
    Arch             = "ůį£á"
    Artix            = "ůį£á"
    CentOS           = "ÔĆĄ"
    Debian           = "ůį£ö"
    Redhat           = "ůĪĄõ"
    RedHatEnterprise = "ůĪĄõ"

[username]
  show_always = true
  style_user  = "bg:os_bg fg:os_fg"
  style_root  = "bg:os_bg fg:os_fg"
  format      = "[ $user ]($style)"

[directory]
  style             = "fg:dir_fg bg:dir_bg"
  format            = "[ $path ]($style)"
  truncation_length = 3
  truncation_symbol = "‚Ä¶/"

  [directory.substitutions]
    "Documents" = "ůįąô "
    "Downloads" = "ÔÄô "
    "Music"     = "ÔÄĀ "
    "Pictures"  = "ÔÄĺ "
    "src"       = "ÓôĚ "

[git_branch]
  symbol = "Ôźė"
  style  = "bg:git_bg"
  format = "[[ $symbol $branch ](fg:git_fg bg:git_bg)]($style)"

[git_status]
  style  = "bg:git_bg"
  format = "[[($all_status$ahead_behind )](fg:git_fg bg:git_bg)]($style)"

[nodejs]
  symbol = "Óúė"
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[c]
  symbol = "Óėě "
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[rust]
  symbol = "Óě®"
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[golang]
  symbol       = "Óėß"
  style        = "bg:lang_bg"
  format       = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"
  detect_files = [
    "go.mod",
    "go.sum",
    "glide.yaml",
    "Gopkg.toml",
    "Gopkg.lock",
    "go.work"
  ]

[php]
  symbol = "Óėą"
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[java]
  symbol = "ÓČĖ "
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[kotlin]
  symbol = "Óėī"
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[haskell]
  symbol = "Óėü"
  style  = "bg:lang_bg"
  format = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"

[python]
  symbol            = "ÓėÜ"
  style             = "bg:lang_bg"
  format            = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"
  detect_files      = [
    "poetry.lock",
    "pyproject.toml",
    "requirements.txt",
    "setup.py",
    "tox.ini"
  ]
  detect_extensions = ["py"]

[lua]
  symbol            = "Óė†"
  style             = "bg:lang_bg"
  format            = "[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)"
  detect_files      = ["selene.toml", ".lua-version"]
  detect_extensions = ["lua"]

[character]
  disabled                  = false
  success_symbol            = "[Ôź≤](bold fg:#81b29a)"
  error_symbol              = "[Ôź≤](bold fg:#c94f6d)"
  vimcmd_symbol             = "[Ôźī](bold fg:green)"
  vimcmd_replace_one_symbol = "[Ôźī](bold fg:purple)"
  vimcmd_replace_symbol     = "[Ôźī](bold fg:purple)"
  vimcmd_visual_symbol      = "[Ôźī](bold fg:yellow)"
